# Teardown App Template
# Reusable template for tearing down a single demo app
# Replaces per-app teardown workflows (finops-demo-app-{appId}/.github/workflows/teardown.yml)
# NOTE: Environment approval is handled by the calling pipeline's deployment job type,
#       not in this template.

parameters:
- name: appId
  type: string
- name: serviceConnection
  type: string
  default: 'finops-scanner-ado'

steps:
- task: AzureCLI@2
  displayName: 'Delete resource group rg-finops-demo-${{ parameters.appId }}'
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      az group delete \
        --name "rg-finops-demo-${{ parameters.appId }}" \
        --yes \
        --no-wait
      echo "Teardown initiated for rg-finops-demo-${{ parameters.appId }}"
