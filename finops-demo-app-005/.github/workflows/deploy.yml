name: Deploy to Azure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: finops-demo-app-005
  RESOURCE_GROUP: rg-finops-demo-005

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: az group create --name ${{ env.RESOURCE_GROUP }} --location canadacentral

      - name: Deploy infrastructure
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/main.bicep

      - name: Get deployment URLs
        id: get-url
        run: |
          EU_URL="${{ steps.deploy.outputs.webAppUrlEurope }}"
          ASIA_URL="${{ steps.deploy.outputs.webAppUrlAsia }}"
          echo "eu_url=$EU_URL" >> "$GITHUB_OUTPUT"
          echo "asia_url=$ASIA_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed EU: $EU_URL"
          echo "Deployed Asia: $ASIA_URL"

      - name: Write job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## 🚀 Deployment Complete

          | Detail | Value |
          |--------|-------|
          | **App** | ${{ env.APP_NAME }} |
          | **URL (Europe)** | [${{ steps.get-url.outputs.eu_url }}](${{ steps.get-url.outputs.eu_url }}) |
          | **URL (Asia)** | [${{ steps.get-url.outputs.asia_url }}](${{ steps.get-url.outputs.asia_url }}) |
          | **Resource Group** | ${{ env.RESOURCE_GROUP }} |
          | **Date** | $(date -u '+%Y-%m-%d %H:%M UTC') |
          EOF

      - name: Take deployment screenshot
        run: |
          sleep 30
          npx --yes playwright install --with-deps chromium
          npx playwright screenshot \
            --viewport-size="1280,900" \
            --wait-for-timeout=5000 \
            --full-page \
            "${{ steps.get-url.outputs.eu_url }}" \
            screenshot.png

      - name: Update wiki
        env:
          WIKI_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -e
          WIKI_REPO="https://x-access-token:${WIKI_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          EU_URL="${{ steps.get-url.outputs.eu_url }}"
          ASIA_URL="${{ steps.get-url.outputs.asia_url }}"
          APP="${{ env.APP_NAME }}"
          BUILD_NUM="${{ github.run_number }}"
          BUILD_ID="${{ github.run_id }}"
          BUILD_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ATTACH_NAME="${APP}-${BUILD_ID}.png"

          git clone --depth 1 "$WIKI_REPO" wiki || {
            mkdir wiki && cd wiki && git init && git remote add origin "$WIKI_REPO"
            cd ..
          }
          mkdir -p wiki/images
          cp screenshot.png "wiki/images/$ATTACH_NAME"

          cat > "wiki/Deployment.md" <<EOF
          # ${APP}

          **Latest Deployment:** ${BUILD_NUM}

          **Date:** $(date -u '+%Y-%m-%d %H:%M UTC')

          **Workflow Run:** [Run ${BUILD_ID}](${BUILD_URL})

          ## Endpoints

          | Region | URL |
          |--------|-----|
          | West Europe | [${EU_URL}](${EU_URL}) |
          | Southeast Asia | [${ASIA_URL}](${ASIA_URL}) |

          ---

          ![Deployment Screenshot (Europe)](images/${ATTACH_NAME})
          EOF
          sed -i 's/^          //g' "wiki/Deployment.md"

          cd wiki
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet && echo "No wiki changes" || {
            git commit -m "Update deployment screenshot for ${APP} (run ${BUILD_ID})"
            git push origin master || git push origin main
            echo "Wiki updated"
          }
